version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bsd_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - bsd_network
    healthcheck:
      # הדגל -C נוסף כאן כדי לפתור את בעיית ה-Trust Server Certificate בבדיקה
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bsd_redis
    command: redis-server --requirepass YourRedisPassword123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bsd_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "YourRedisPassword123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ASP.NET Core API
  bsd-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bsd_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BsdFinalProjectDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=true;"
      Redis__Host: "redis"
      Redis__Port: "6379"
      Redis__Password: "YourRedisPassword123"
      Cache__DefaultTTL: "3600"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__Topic: "transactions"
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - bsd_network
    volumes:
      - ./BsdFinalProject:/app/BsdFinalProject
    restart: unless-stopped

  # Zookeeper for Kafka
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: bsd_zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    networks:
      - bsd_network

  # Kafka broker
  kafka:
    image: bitnami/kafka:latest
    container_name: bsd_kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    networks:
      - bsd_network
    depends_on:
      - zookeeper

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bsd_kafka_ui
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    ports:
      - "8080:8080"
    networks:
      - bsd_network
    depends_on:
      - kafka

volumes:
  sqlserver_data:
  redis_data:

networks:
  bsd_network:
    driver: bridge